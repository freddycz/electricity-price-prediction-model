<!-- metrics.html -->
<div class="shrink-0 px-4 py-4 pb-6">
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <!-- Průměrná chyba (Avg error) -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
            <h3 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wide mb-1">Průměrná chyba</h3>
            <div class="text-2xl sm:text-3xl font-bold text-gray-900">42.5 <span class="text-sm font-normal text-gray-400">CZK/MWh</span></div>
        </div>

        <!-- Zkreslení - průměr (Bias) -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
            <h3 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wide mb-1">Zkreslení - průměr (Bias)</h3>
            <div class="text-2xl sm:text-3xl font-bold text-red-500">+12.3 <span class="text-sm font-normal text-gray-400">CZK/MWh</span></div>
        </div>

        <!-- Maximální absolutní chyba -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
            <h3 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wide mb-1">Maximální abs. chyba</h3>
            <div class="text-2xl sm:text-3xl font-bold text-gray-900">120.0 <span class="text-sm font-normal text-gray-400">CZK/MWh</span></div>
        </div>

    </div>
</div>
