<!-- metrics.html -->
<div class="flex-1 px-4 py-4 pb-6 w-full">
    <div class="max-w-7xl mx-auto flex flex-col items-center">

        <div class="w-full flex justify-between items-center mb-4 px-2">
            <h2 class="text-xl font-bold text-gray-800">Denní přehled</h2>
        </div>

        <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-4">

            <!-- Průměrná chyba (Avg error) -->
            <div
                class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
                <h3 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wide mb-1">Průměrná chyba
                </h3>
                <div class="text-2xl sm:text-3xl font-bold text-gray-900">{{ data.metrics.avg_error }} <span
                        class="text-sm font-normal text-gray-400">EUR/MWh</span></div>
            </div>

            <!-- Mediánová chyba (Median error) -->
            <div
                class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
                <h3 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wide mb-1">Mediánová chyba
                </h3>
                <div class="text-2xl sm:text-3xl font-bold text-gray-900">{{ data.metrics.median_error }} <span
                        class="text-sm font-normal text-gray-400">EUR/MWh</span></div>
            </div>

            <!-- Zkreslení - průměr (Bias) -->
            <div
                class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
                <h3 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wide mb-1">Zkreslení -
                    průměr (Bias)</h3>
                <div class="text-2xl sm:text-3xl font-bold text-red-500">{{ data.metrics.bias }} <span
                        class="text-sm font-normal text-gray-400">EUR/MWh</span></div>
            </div>

        </div>

    </div>
</div>
