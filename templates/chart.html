<!-- chart.html -->
<div class="flex-1 min-h-0 flex flex-col px-4 py-2 w-full mx-auto">
  <!-- Obalový div grafu pro zajištění responsivity a velikosti -->
  <div
    class="bg-white rounded-xl shadow-md border border-gray-200 p-4 w-full h-full flex flex-col justify-center relative overflow-hidden">
    <!-- Webová komponenta google-chart z Unpkg -->
    <google-chart class="w-full h-full flex-1" style="width: 100%; height: 100%; min-height: 400px" type="stepped-area"
      options='{"areaOpacity": 0, "isStacked": false, "legend": "none", "animation": {"duration": 500, "startup": true}, "colors": ["#4f46e5", "#10b981"], "hAxis": {"showTextEvery": 8, "slantedText": false, "textStyle": {"fontSize": 10}}, "vAxis": {"title": "EUR/MWh"}, "chartArea": {"left": 65, "right": 20, "top": 20, "bottom": 40, "width": "100%", "height": "100%"}, "focusTarget": "category"}'
      data='{{ data.chart_data | tojson | safe }}'>
    </google-chart>

    <!-- Custom non-interactive legend -->
    <div class="flex justify-center flex-wrap gap-6 mt-2 text-sm text-gray-700 pb-2">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full" style="background-color: #4f46e5"></div>
        <span>Predikce</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full" style="background-color: #10b981"></div>
        <span>Skutečnost</span>
      </div>
    </div>
  </div>
</div>
